<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Starter App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-content">
        <div class="logo">
          <span class="logo-icon">✦</span>
          <span class="logo-text">AI Starter App</span>
        </div>
        <button id="clearBtn" class="btn btn-secondary" title="Clear conversation">Clear</button>
      </div>
    </header>

    <main class="chat-container">
      <div id="messages" class="messages">
        <div class="welcome-message">
          <div class="welcome-icon">✦</div>
          <h2>Welcome to AI Starter App</h2>
          <p>Start a conversation by typing a message below.</p>
        </div>
      </div>
    </main>

    <footer class="input-area">
      <div class="input-container">
        <textarea
          id="userInput"
          class="input-field"
          placeholder="Type a message…"
          rows="1"
          autofocus
        ></textarea>
        <button id="sendBtn" class="btn btn-primary" title="Send message">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <p class="disclaimer">AI can make mistakes. Verify important information.</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
